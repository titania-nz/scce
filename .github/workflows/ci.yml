name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - lint
          - typecheck
          - test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.check }}
        run: npm run ${{ matrix.check }}
        continue-on-error: true # Non-blocking baseline mode; remove to enforce as required checks.
